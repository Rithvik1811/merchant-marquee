version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    dns:
      - 100.100.2.136
      - 100.100.2.138
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_BASE_URL: "ws://merchantmarquee.com"
    environment:
      BACKEND_URL: http://backend:8000
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped
    dns:
      - 100.100.2.136
      - 100.100.2.138
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: productcut-prod
